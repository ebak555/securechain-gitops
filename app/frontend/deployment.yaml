apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: securechain
  labels:
    app: frontend
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        environment: production
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: frontend
          image: ghcr.io/ebak555/securechain-frontend:sha-6ce17ced033da8b90c86cdc0f7af9fb262200fda
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
