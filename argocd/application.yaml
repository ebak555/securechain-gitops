apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: securechain
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ebak555/securechain-gitops.git
    targetRevision: main
    path: app
  destination:
    server: https://kubernetes.default.svc
    namespace: securechain
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
